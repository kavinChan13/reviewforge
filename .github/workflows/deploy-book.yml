name: Deploy Book to GitHub Pages

# 构建 book/ 下的 VitePress «ReviewForge 源码解析» 并发布到 GitHub Pages。
#
# 采用 GitHub 官方「GitHub Actions」部署方式：直接从 main 构建产物上传并发布，
# 不创建任何 gh-pages 分支。
#
# 一次性设置（仓库 admin，仅首次）：
#   Settings → Pages → Build and deployment → Source 选 "GitHub Actions"。
#   （内置 GITHUB_TOKEN 无权自动开启 Pages，故首次需手动选一次；之后全自动。）
#   Pages source 已设为 "GitHub Actions"。

on:
  push:
    branches: [main]
    paths:
      - "book/**"
      - ".github/workflows/deploy-book.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 只允许一个并发部署；不取消进行中的部署，确保完整上线。
concurrency:
  group: pages-book
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: book
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Build with VitePress
        run: npm run build
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
