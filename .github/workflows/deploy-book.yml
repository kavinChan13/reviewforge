name: Deploy Book to GitHub Pages

# 构建 book/ 下的 VitePress «ReviewForge 源码解析» 并发布到 GitHub Pages。
#
# 采用「分支发布」方式：把构建产物推送到 gh-pages 分支，由 Pages 从该分支提供服务。
# 这样可以绕开 configure-pages 的「创建 Pages 站点」API —— 内置 GITHUB_TOKEN 无权
# 创建/启用 Pages（会报 "Resource not accessible by integration"），分支发布只需
# contents: write 即可。
#
# 一次性设置（仓库 admin，仅首次）：
#   Settings → Pages → Build and deployment → Source 选 "Deploy from a branch"，
#   分支选 gh-pages、目录选 / (root)。之后每次推 book/ 都会自动更新站点。

on:
  push:
    branches: [main]
    paths:
      - "book/**"
      - ".github/workflows/deploy-book.yml"
  workflow_dispatch:

permissions:
  contents: write # 推送 gh-pages 分支

concurrency:
  group: pages-book
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: book

      - name: Build with VitePress
        run: npm run build
        working-directory: book

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./book/.vitepress/dist
          # 纯静态站点，关闭 Jekyll（自动写入 .nojekyll）。
          force_orphan: true
